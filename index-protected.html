<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antizyklisches Einstiegssignal</title>
<style>
/* ── LOGIN OVERLAY ── */
#login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: #0a0e17;
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: #111827;
  border: 1px solid rgba(148,163,184,.15);
  border-radius: 12px;
  padding: 2.5rem 2rem;
  width: 340px;
  text-align: center;
}
.login-logo {
  width: 48px; height: 48px;
  background: #1D9E75;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
  font-size: 22px;
}
.login-box h2 {
  color: #e2e8f0; font-size: 17px; font-weight: 600;
  margin: 0 0 4px;
}
.login-box p {
  color: #64748b; font-size: 13px; margin: 0 0 1.5rem;
}
.login-box input[type=password] {
  width: 100%; box-sizing: border-box;
  background: #0a0e17;
  border: 1px solid rgba(148,163,184,.2);
  border-radius: 8px;
  color: #e2e8f0; font-size: 14px;
  padding: 10px 14px;
  outline: none;
}
.login-box input[type=password]:focus {
  border-color: #1D9E75;
}
.login-btn {
  width: 100%; margin-top: 12px;
  background: #1D9E75; color: #fff;
  border: none; border-radius: 8px;
  padding: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.login-btn:hover { background: #0F6E56; }
.login-err {
  color: #f87171; font-size: 12px;
  margin-top: 8px; display: none;
}

/* ── DASHBOARD (versteckt bis Login) ── */
#dashboard { display: none; }

/* ── ORIGINAL STYLES ── */
:root {
  --bg: #0a0e17;
  --fg: #e2e8f0;
  --muted: #64748b;
  --border: rgba(148,163,184,.12);
  --card: #111827;
  --card2: #0f172a;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --blue: #60a5fa;
  --font: 'Inter', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 14px; min-height: 100vh; padding: 24px 16px 48px; }
#app { max-width: 960px; margin: 0 auto; }
.hl { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--green); text-transform: uppercase; margin-bottom: 8px; }
h1 { font-size: 22px; font-weight: 700; color: var(--fg); margin-bottom: 6px; line-height: 1.2; }
.sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.ui { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.ud { width: 8px; height: 8px; border-radius: 50%; }
.ud.lv { background: var(--green); box-shadow: 0 0 6px var(--green); }
.ud.st { background: var(--amber); }
.ud.er { background: var(--red); }
.ut { font-size: 11px; color: var(--muted); }
.sl { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.sl label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.sl input[type=range] { flex: 1; min-width: 120px; max-width: 220px; accent-color: var(--amber); }
.sv { font-size: 13px; font-weight: 700; color: var(--amber); min-width: 40px; }
.sr { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
.sc { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden; }
.sc.m { border-color: rgba(34,197,94,.25); background: rgba(34,197,94,.04); }
.bd { position: absolute; top: 10px; right: 10px; font-size: 8px; font-weight: 800; letter-spacing: .1em; color: var(--muted); opacity: .4; }
.sc.m .bd { color: var(--green); opacity: .7; }
.lb { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.vl { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.th { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.ck { font-size: 11px; font-weight: 600; }
.ck.y { color: var(--green); }
.ck.n { color: var(--muted); }
.btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 12px; padding: 5px 12px; transition: all .15s; }
.btn:hover, .btn.ac { background: var(--card); color: var(--fg); border-color: rgba(148,163,184,.3); }
.cw { width: 100%; overflow-x: auto; margin-bottom: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px; }
svg { display: block; width: 100%; }
.tb { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: none; }
.tb.a { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.tl { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: .08em; display: block; margin-bottom: 2px; }
.tv { font-size: 13px; font-weight: 600; color: var(--fg); }
.sb { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.sh { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.st { font-size: 14px; font-weight: 700; color: var(--fg); }
.ab { background: rgba(34,197,94,.12); color: var(--green); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.sg { display: grid; grid-template-columns: 70px 1fr auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.sg:last-child { border-bottom: none; }
.sd { font-size: 12px; font-weight: 700; color: var(--muted); }
.si { font-size: 12px; color: var(--muted); }
.sret { font-size: 12px; font-weight: 700; white-space: nowrap; }
.hb { font-size: 11px; color: var(--muted); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); line-height: 1.6; }
.sg2 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.snc { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: border-color .15s; }
.snc:hover, .snc.ac { border-color: rgba(245,158,11,.4); }
.snt { font-size: 11px; font-weight: 700; margin-bottom: 6px; }
.sns { font-size: 11px; color: var(--muted); line-height: 1.7; }
.ft { font-size: 10px; color: var(--muted); text-align: center; margin-top: 24px; }
@media (max-width: 600px) {
  .sr { grid-template-columns: 1fr; }
  .sg2 { grid-template-columns: repeat(3, 1fr); }
  .sg { grid-template-columns: 60px 1fr; }
  .sret { display: none; }
  .tb.a { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- ── LOGIN OVERLAY ── -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">📈</div>
    <h2>Beratungskunden-Bereich</h2>
    <p>Bitte geben Sie das Passwort ein.</p>
    <input type="password" id="pw-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()" autofocus />
    <div class="login-err" id="pw-err">Falsches Passwort. Bitte erneut versuchen.</div>
    <button class="login-btn" onclick="doLogin()">Anmelden</button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div id="app"><div style="color:var(--muted);padding:40px;text-align:center">Lade Live-Daten…</div></div>

  const pw = document.getElementById('pw-input').value;

    document.getElementById('dashboard').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function process(hist, live) {
  const data = hist.map(h => ({date:h.d, fg:h.fg, vix:h.vix, sp:h.sp}));
  if (live) {
    const last = data[data.length-1];
    if (live.vix != null) last.vix = live.vix;
    if (live.sp500 != null) last.sp = live.sp500;
    if (live.fearGreed != null) last.fg = live.fearGreed;
  }
  let ath = 0;
  return data.map(d => { if(d.sp>ath) ath=d.sp; return {...d, drawdown:((d.sp-ath)/ath)*100, ath}; });
}

function fwdRet(data, idx) {
  const f = Math.min(idx+12, data.length-1);
  return f <= idx ? null : ((data[f].sp - data[idx].sp) / data[idx].sp * 100).toFixed(1);
}

let S = { data:[], fgT:25, hov:null, tr:'all', status:'loading', lastUp:null };
const isB = d => d.fg<=S.fgT && d.vix>30 && d.drawdown<-5;
const cM = d => [d.fg<=S.fgT, d.vix>30, d.drawdown<-5].filter(Boolean).length;
function vis() {
  if(S.tr==='all') return S.data;
  const m = S.tr==='3y'?36:60;
  return S.data.slice(Math.max(0,S.data.length-m));
}

function render() {
  const data=vis(), full=S.data, cur=full[full.length-1];
  if(!cur) return;
  const bs=data.map((d,i)=>({...d,i})).filter(d=>isB(d));
  const nm=data.map((d,i)=>({...d,i,met:cM(d)})).filter(d=>d.met>=2&&!isB(d));
  const hs=full.map((d,i)=>({...d,idx:i})).filter(d=>isB(d)).map(d=>({...d,fw:fwdRet(full,d.idx)}));
  const vr=hs.filter(s=>s.fw!==null);
  const ar=vr.length>0?(vr.reduce((a,b)=>a+parseFloat(b.fw),0)/vr.length).toFixed(1):null;
  const W=900,HH=500,pL=55,pR=55,pT=30,pB=65,pW=W-pL-pR,pH=HH-pT-pB;
  const xS=i=>pL+(i/(data.length-1))*pW;
  const yF=v=>pT+((100-v)/100)*pH;
  const mV=Math.max(...data.map(d=>d.vix),40);
  const yV=v=>pT+((mV-v)/mV)*pH;
  const mD=Math.min(...data.map(d=>d.drawdown),-10);
  const yD=v=>pT+((-v/mD)*pH);
  const mnSP=Math.min(...data.map(d=>d.sp)),mxSP=Math.max(...data.map(d=>d.sp));
  const ySP=v=>pT+((mxSP-v)/(mxSP-mnSP))*pH;
  const mkP=fn=>data.map((d,i)=>`${i===0?'M':'L'}${xS(i).toFixed(1)},${fn(d).toFixed(1)}`).join(' ');
  const spArea=mkP(d=>ySP(d.sp))+` L${xS(data.length-1).toFixed(1)},${(pT+pH).toFixed(1)} L${pL.toFixed(1)},${(pT+pH).toFixed(1)} Z`;
  const yrs=[]; let ly=null;
  data.forEach((d,i)=>{const y=d.date.slice(0,4);if(y!==ly){yrs.push({y,i});ly=y;}});
  const sD=S.status==='live'?'lv':S.status==='stale'?'st':'er';
  const sT=S.status==='live'?'Live-Daten aktiv':S.status==='stale'?'Historische Daten (Live-Daten nicht verfügbar)':'Lade…';

    <h1>Fear & Greed · VIX · S&P 500 Drawdown</h1>
    <p class="sub">Kaufsignal wenn: F&G ≤ ${S.fgT} · VIX > 30 · S&P 500 Korrektur > 5% vom ATH</p>
    <div class="ui"><div class="ud ${sD}"></div><div class="ut">${sT}${S.lastUp?' · Update: '+new Date(S.lastUp).toLocaleString('de-CH'):''}</div></div>
    <div class="sl">
      <label>F&G Schwellenwert:</label>
      <input type="range" min="5" max="50" value="${S.fgT}" id="fgs">
      <div class="sv">≤ ${S.fgT}</div>
      <div style="font-size:10px;color:var(--muted)">${S.fgT<=10?'Extreme Fear':S.fgT<=25?'Extreme Fear / Fear':S.fgT<=40?'Fear':'Neutral'}</div>
    </div>
    <div class="sr">
      ${[{l:'Fear & Greed',v:String(cur.fg),t:'≤ '+S.fgT,m:cur.fg<=S.fgT,c:'var(--amber)'},
         {l:'VIX',v:cur.vix.toFixed(1),t:'> 30',m:cur.vix>30,c:'var(--red)'},
         {l:'S&P 500 Drawdown',v:cur.drawdown.toFixed(1)+'%',t:'> 5%',m:cur.drawdown<-5,c:'var(--blue)'}
      ].map(c=>`<div class="sc ${c.m?'m':''}"><div class="bd">ERFÜLLT</div><div class="lb">${c.l}</div><div class="vl" style="color:${c.c}">${c.v}</div><div class="th">Schwelle: ${c.t}</div><div class="ck ${c.m?'y':'n'}">${c.m?'✓ Erfüllt':'✗ Nicht erfüllt'}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
      ${['3y','5y','all'].map(t=>`<button class="btn ${S.tr===t?'ac':''}" data-r="${t}">${t==='3y'?'3J':t==='5y'?'5J':'Alle (2018–2026)'}</button>`).join('')}

    </div>
    <div class="cw"><svg id="ch" viewBox="0 0 ${W} ${HH}">
      ${[0,.25,.5,.75,1].map(f=>`<line x1="${pL}" x2="${W-pR}" y1="${pT+f*pH}" y2="${pT+f*pH}" stroke="rgba(148,163,184,.08)"/>`).join('')}
      ${bs.map(s=>`<rect x="${xS(s.i)-pW/data.length/2}" y="${pT}" width="${Math.max(pW/data.length,8)}" height="${pH}" fill="var(--green)" opacity=".15" rx="2"/>`).join('')}
      ${nm.map(s=>`<rect x="${xS(s.i)-pW/data.length/2}" y="${pT}" width="${Math.max(pW/data.length,8)}" height="${pH}" fill="var(--amber)" opacity=".06" rx="2"/>`).join('')}
      <path d="${spArea}" fill="rgba(148,163,184,.06)" stroke="none"/>
      <path d="${mkP(d=>ySP(d.sp))}" fill="none" stroke="rgba(148,163,184,.45)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <line x1="${pL}" x2="${W-pR}" y1="${yF(S.fgT)}" y2="${yF(S.fgT)}" stroke="var(--amber)" stroke-dasharray="4,4" opacity=".4"/>
      <text x="${W-pR+4}" y="${yF(S.fgT)+3}" fill="var(--amber)" font-size="8" opacity=".6">FG=${S.fgT}</text>
      <line x1="${pL}" x2="${W-pR}" y1="${yV(30)}" y2="${yV(30)}" stroke="var(--red)" stroke-dasharray="4,4" opacity=".4"/>
      <text x="${pL-2}" y="${yV(30)-4}" fill="var(--red)" font-size="8" opacity=".6" text-anchor="end">VIX=30</text>
      <line x1="${pL}" x2="${W-pR}" y1="${yD(-5)}" y2="${yD(-5)}" stroke="var(--blue)" stroke-dasharray="4,4" opacity=".4"/>
      <text x="${pL-2}" y="${yD(-5)+3}" fill="var(--blue)" font-size="8" opacity=".6" text-anchor="end">-5%</text>
      <path d="${mkP(d=>yF(d.fg))}" fill="none" stroke="var(--amber)" stroke-width="2" opacity=".85"/>
      <path d="${mkP(d=>yV(d.vix))}" fill="none" stroke="var(--red)" stroke-width="2" opacity=".85"/>
      <path d="${mkP(d=>yD(d.drawdown))}" fill="none" stroke="var(--blue)" stroke-width="2" opacity=".85"/>
      ${bs.map(s=>`<circle cx="${xS(s.i)}" cy="${yF(s.fg)}" r="5" fill="var(--green)" stroke="#fff" stroke-width="1.5"/><text x="${xS(s.i)}" y="${pT-8}" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="700" font-family="var(--font)">KAUF</text>`).join('')}
      ${yrs.map(yl=>`<text x="${xS(yl.i)}" y="${HH-pB+20}" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="var(--font)">${yl.y}</text>`).join('')}
      ${[0,25,50,75,100].map(v=>`<text x="${pL-8}" y="${yF(v)+3}" text-anchor="end" fill="var(--muted)" font-size="8" font-family="var(--font)">${v}</text>`).join('')}
      ${[0,.25,.5,.75,1].map(f=>{const v=Math.round(mnSP+(mxSP-mnSP)*(1-f));return`<text x="${W-pR+8}" y="${pT+f*pH+3}" text-anchor="start" fill="rgba(148,163,184,.5)" font-size="8" font-family="var(--font)">${v.toLocaleString()}</text>`;}).join('')}
      <g transform="translate(${pL+10},${pT+14})">
        <rect x="-6" y="-12" width="210" height="74" fill="rgba(10,14,23,.85)" rx="4"/>
        <circle cx="4" cy="0" r="4" fill="var(--amber)"/><text x="14" y="4" fill="var(--amber)" font-size="10" font-family="var(--font)">Fear & Greed (0–100)</text>
        <circle cx="4" cy="16" r="4" fill="var(--red)"/><text x="14" y="20" fill="var(--red)" font-size="10" font-family="var(--font)">VIX</text>
        <circle cx="4" cy="32" r="4" fill="var(--blue)"/><text x="14" y="36" fill="var(--blue)" font-size="10" font-family="var(--font)">S&P 500 Drawdown vom ATH</text>
        <line x1="0" x2="8" y1="48" y2="48" stroke="rgba(148,163,184,.5)" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="14" y="52" fill="rgba(148,163,184,.5)" font-size="10" font-family="var(--font)">S&P 500 Kurs (rechte Achse)</text>
      </g>
    </svg></div>
    <div class="tb" id="tt"></div>
    <div class="sb">
      <div class="sh"><div class="st">Historische Kaufsignale (F&G ≤ ${S.fgT} + VIX > 30 + DD > 5%)</div>${ar?`<div class="ab">Ø 12M: +${ar}%</div>`:''}</div>
      ${hs.length===0?'<div style="font-size:12px;color:var(--muted);padding:20px 0;text-align:center">Keine Signale. Erhöhe den F&G-Wert.</div>':
        hs.map(s=>`<div class="sg"><div class="sd">${s.date}</div><div class="si">FG: <span style="color:var(--amber);font-weight:600">${s.fg}</span> · VIX: <span style="color:var(--red);font-weight:600">${s.vix}</span> · DD: <span style="color:var(--blue);font-weight:600">${s.drawdown.toFixed(1)}%</span> · S&P: ${s.sp.toLocaleString()}</div><div class="sret" style="color:${s.fw&&parseFloat(s.fw)>0?'var(--green)':s.fw?'var(--red)':'var(--muted)'}">${s.fw?'→ '+(parseFloat(s.fw)>0?'+':'')+s.fw+'% (12M)':'→ noch offen'}</div></div>`).join('')}
      <div class="hb"><span style="color:var(--amber);font-weight:700">Hinweis:</span> ${hs.length} Signal${hs.length!==1?'e':''} seit 2018 bei F&G ≤ ${S.fgT}. Monatliche Snapshots. Keine Anlageberatung.</div>
    </div>
    <div class="sb">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px;color:var(--fg)">Sensitivitätsanalyse</div>
      <div class="sg2">${[10,15,20,25,30,35].map(th=>{
        const sigs=full.filter(d=>d.fg<=th&&d.vix>30&&d.drawdown<-5);
        const wR=sigs.map(d=>({r:fwdRet(full,full.indexOf(d))}));
        const vR2=wR.filter(s=>s.r!==null);
        const av=vR2.length>0?(vR2.reduce((a,b)=>a+parseFloat(b.r),0)/vR2.length).toFixed(1):'–';
        const ac=th===S.fgT;
        return `<div class="snc ${ac?'ac':''}" data-t="${th}"><div class="snt" style="color:${ac?'var(--amber)':'var(--fg)'}">F&G ≤ ${th} ${ac?'◄':''}</div><div class="sns">Signale: <span style="color:var(--fg);font-weight:600">${sigs.length}</span><br>Ø 12M: <span style="color:${av!=='–'?'var(--green)':'var(--muted)'};font-weight:600">${av!=='–'?'+'+av+'%':av}</span><br>~${sigs.length>0?(8/sigs.length).toFixed(1):'–'} J/Signal</div></div>`;
      }).join('')}</div>
    </div>
    <div class="ft">CNN Fear & Greed Index · CBOE VIX · S&P 500 · Live via Cloudflare Worker · Keine Anlageberatung</div>`;

  document.getElementById('fgs')?.addEventListener('input',e=>{S.fgT=parseInt(e.target.value);render();});
  document.querySelectorAll('.btn[data-r]').forEach(b=>b.addEventListener('click',()=>{S.tr=b.dataset.r;render();}));
  document.querySelectorAll('.snc[data-t]').forEach(c=>c.addEventListener('click',()=>{S.fgT=parseInt(c.dataset.t);render();}));

  const ch=document.getElementById('ch'), tt=document.getElementById('tt');
  ch?.addEventListener('mousemove',e=>{
    const r=ch.getBoundingClientRect(), sx=((e.clientX-r.left)/r.width)*W;
    const idx=Math.round(((sx-pL)/pW)*(data.length-1));
    if(idx>=0&&idx<data.length){
      const d=data[idx],b=isB(d),m=cM(d);
      tt.className='tb a';
      tt.innerHTML=`<div><span class="tl">DATUM</span><div class="tv">${d.date}</div></div>
        <div><span class="tl">F&G</span><div class="tv" style="color:${d.fg<=S.fgT?'var(--green)':'var(--amber)'}">${d.fg}${d.fg<=S.fgT?' ✓':''}</div></div>
        <div><span class="tl">VIX</span><div class="tv" style="color:${d.vix>30?'var(--green)':'var(--red)'}">${d.vix.toFixed(1)}${d.vix>30?' ✓':''}</div></div>
        <div><span class="tl">S&P</span><div class="tv">${d.sp.toLocaleString()}</div></div>
        <div><span class="tl">DD</span><div class="tv" style="color:${d.drawdown<-5?'var(--green)':'var(--blue)'}">${d.drawdown.toFixed(1)}%${d.drawdown<-5?' ✓':''}</div></div>
        <div><span class="tl">SIGNAL</span><div class="tv" style="font-weight:700;color:${b?'var(--green)':m>=2?'var(--amber)':'var(--muted)'}">${b?'🟢 KAUFEN':m>=2?'🟡 FAST':'⚪ WARTEN'}</div></div>`;
    }
  });
  ch?.addEventListener('mouseleave',()=>{tt.className='tb';});
}

async function fetchLive() {
  try {
    const res = await fetch(WORKER_URL + '/api/data');
    if (!res.ok) throw new Error('Worker: ' + res.status);
    return await res.json();
  } catch(e) {
    console.warn('Worker fetch failed:', e.message);
    return null;
  }
}

async function init() {
  S.data = process(H_DATA, null);
  S.status = 'stale';
  render();
  const live = await fetchLive();
  if (live && (live.fearGreed || live.vix || live.sp500)) {
    S.data = process(H_DATA, live);
    S.status = 'live';
    S.lastUp = live.fetchedAt;
    render();
  }
  setInterval(async () => {
    const live = await fetchLive();
    if (live && (live.fearGreed || live.vix || live.sp500)) {
      S.data = process(H_DATA, live);
      S.status = 'live';
      S.lastUp = live.fetchedAt;
      render();
    }
  }, CACHE_MS);
}
</script>
</body>
</html>
