<title>Antizyklisches Einstiegssignal</title>

:root {
  --bg: #0a0e17; --fg: #e2e8f0; --muted: #64748b;

  --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --blue: #60a5fa;
  --font: 'Inter', system-ui, sans-serif;

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 14px; min-height: 100vh; padding: 24px 16px 48px; }
#app { max-width: 960px; margin: 0 auto; }
.hl { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--green); text-transform: uppercase; margin-bottom: 8px; }
h1 { font-size: 22px; font-weight: 700; color: var(--fg); margin-bottom: 6px; }
.sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.ui { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
.ud { width: 8px; height: 8px; border-radius: 50%; }
.ud.lv { background: var(--green); box-shadow: 0 0 6px var(--green); }
.ud.st { background: var(--amber); }
.ut { font-size: 11px; color: var(--muted); }
.tranchen { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
.tranche { border-radius: 12px; padding: 18px 16px; border: 1px solid; position: relative; }
.tranche.t1 { background: rgba(34,197,94,.05); border-color: rgba(34,197,94,.2); }
.tranche.t2 { background: rgba(245,158,11,.05); border-color: rgba(245,158,11,.2); }
.tranche.t3 { background: rgba(239,68,68,.05); border-color: rgba(239,68,68,.2); }
.tranche.active.t1 { background: rgba(34,197,94,.13); border-color: rgba(34,197,94,.55); box-shadow: 0 0 24px rgba(34,197,94,.12); }
.tranche.active.t2 { background: rgba(245,158,11,.13); border-color: rgba(245,158,11,.55); box-shadow: 0 0 24px rgba(245,158,11,.12); }
.tranche.active.t3 { background: rgba(239,68,68,.13); border-color: rgba(239,68,68,.55); box-shadow: 0 0 24px rgba(239,68,68,.12); }
.t-badge { display: inline-block; font-size: 9px; font-weight: 800; letter-spacing: .1em; padding: 2px 8px; border-radius: 20px; margin-bottom: 10px; }
.t1 .t-badge { background: rgba(34,197,94,.2); color: var(--green); }
.t2 .t-badge { background: rgba(245,158,11,.2); color: var(--amber); }
.t3 .t-badge { background: rgba(239,68,68,.2); color: var(--red); }
.t-pct { font-size: 38px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
.t1 .t-pct { color: var(--green); }
.t2 .t-pct { color: var(--amber); }
.t3 .t-pct { color: var(--red); }
.t-desc { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
.t-conds { display: flex; flex-direction: column; gap: 5px; }
.cond { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.cond-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cond.met { color: var(--fg); }
.cond.unmet { color: var(--muted); }
.cond.met .cond-dot { background: var(--green); }
.cond.unmet .cond-dot { background: rgba(148,163,184,.3); }
.now-badge { position: absolute; top: 12px; right: 12px; font-size: 9px; font-weight: 800; letter-spacing: .08em; padding: 2px 8px; border-radius: 10px; }
.t1 .now-badge { background: var(--green); color: #000; }
.t2 .now-badge { background: var(--amber); color: #000; }
.t3 .now-badge { background: var(--red); color: #fff; }
.sr { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
.sc { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.sc.m { border-color: rgba(34,197,94,.3); background: rgba(34,197,94,.04); }
.lb { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.vl { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.th { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
.ck { font-size: 11px; font-weight: 600; }
.ck.y { color: var(--green); }
.ck.n { color: var(--muted); }
.rechner { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 24px; }
.rechner-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.rechner-row { display: flex; align-items: center; gap: 12px; }
.rechner-row label { font-size: 12px; color: var(--muted); min-width: 160px; }
.r-input { background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 15px; font-weight: 700; padding: 7px 12px; width: 160px; outline: none; }
.r-input:focus { border-color: rgba(148,163,184,.4); }
.r-results { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 14px; }
.rr { border-radius: 8px; padding: 12px 14px; text-align: center; }
.rr.t1 { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); }
.rr.t2 { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); }
.rr.t3 { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); }
.rr-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.rr-val { font-size: 20px; font-weight: 800; }
.t1 .rr-val { color: var(--green); }
.t2 .rr-val { color: var(--amber); }
.t3 .rr-val { color: var(--red); }
.btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 12px; padding: 5px 12px; }
.btn:hover, .btn.ac { background: var(--card); color: var(--fg); border-color: rgba(148,163,184,.3); }
.cw { width: 100%; overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px; margin-bottom: 20px; }
svg { display: block; width: 100%; }
.tb { display: none; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
.tb.a { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; }
.tl { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: .08em; display: block; margin-bottom: 2px; }
.tv { font-size: 13px; font-weight: 600; }
.sb { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.sh { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.st { font-size: 14px; font-weight: 700; }
.ab { background: rgba(34,197,94,.12); color: var(--green); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.sg { display: grid; grid-template-columns: 70px 1fr auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.sg:last-child { border-bottom: none; }
.sd { font-size: 12px; font-weight: 700; color: var(--muted); }
.si { font-size: 12px; color: var(--muted); }
.sret { font-size: 12px; font-weight: 700; white-space: nowrap; }
.hb { font-size: 11px; color: var(--muted); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); line-height: 1.6; }
.ft { font-size: 10px; color: var(--muted); text-align: center; margin-top: 24px; }
#login-overlay { position:fixed;inset:0;z-index:9999;background:#0a0e17;display:flex;align-items:center;justify-content:center; }
.login-box { background:#111827;border:1px solid rgba(148,163,184,.15);border-radius:12px;padding:2.5rem 2rem;width:340px;text-align:center; }
.login-logo { width:48px;height:48px;background:#1D9E75;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:22px; }

.login-box input[type=password] { width:100%;box-sizing:border-box;background:#0a0e17;border:1px solid rgba(148,163,184,.2);border-radius:8px;color:#e2e8f0;font-size:14px;padding:10px 14px;outline:none; }
.login-box input[type=password]:focus { border-color:#1D9E75; }
.login-btn { width:100%;margin-top:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:600;cursor:pointer; }
.login-btn:hover { background:#0F6E56; }
.login-err { color:#f87171;font-size:12px;margin-top:8px;display:none; }
#dashboard { display:none; }
@media (max-width: 640px) {
  .tranchen, .sr, .r-results { grid-template-columns: 1fr; }
  .sg { grid-template-columns: 60px 1fr; }
  .sret { display: none; }
  .tb.a { grid-template-columns: repeat(3,1fr); }

</head>

function buildData(live) {
  const rows = H_DATA.map(h => ({date:h.d, fg:h.fg, vix:h.vix, sp:h.sp}));
  if (live) {
    const last = rows[rows.length-1];
    if (live.fearGreed != null) last.fg = live.fearGreed;
    if (live.vix != null) last.vix = live.vix;
    if (live.sp500 != null) last.sp = live.sp500;
  }
  let ath = 0;
  return rows.map(d => { if(d.sp>ath) ath=d.sp; return {...d, drawdown:((d.sp-ath)/ath)*100, ath}; });
}

function fwdRet(data, idx) {
  const f = Math.min(idx+12, data.length-1);
  return f<=idx ? null : ((data[f].sp - data[idx].sp)/data[idx].sp*100).toFixed(1);
}

function tActive(d, t) {
  return d.drawdown < t.spDD && d.vix > t.vixMin && d.fg < t.fgMax;
}

function chf(n) {
  return n.toLocaleString('de-CH',{maximumFractionDigits:0})+' CHF';
}

function vis() {
  if(S.tr==='all') return S.data;
  const m = S.tr==='3y'?36:S.tr==='5y'?60:120;
  return S.data.slice(Math.max(0, S.data.length-m));
}

function render() {
  const data=vis(), full=S.data, cur=full[full.length-1];
  if(!cur) return;

  const W=900,HH=420,pL=52,pR=52,pT=28,pB=55,pW=W-pL-pR,pH=HH-pT-pB;
  const xS=i=>pL+(i/(data.length-1))*pW;
  const mD=Math.min(...data.map(d=>d.drawdown),-22);
  const yD=v=>pT+((-v/(-mD))*pH);
  const yF=v=>pT+((100-v)/100*pH);
  const mV=Math.max(...data.map(d=>d.vix),40);
  const yV=v=>pT+((mV-v)/mV*pH);
  const mnSP=Math.min(...data.map(d=>d.sp)), mxSP=Math.max(...data.map(d=>d.sp));
  const ySP=v=>pT+((mxSP-v)/(mxSP-mnSP)*pH);
  const mkP=fn=>data.map((d,i)=>`${i===0?'M':'L'}${xS(i).toFixed(1)},${fn(d).toFixed(1)}`).join(' ');
  const spArea=mkP(d=>ySP(d.sp))+` L${xS(data.length-1).toFixed(1)},${(pT+pH).toFixed(1)} L${pL},${(pT+pH).toFixed(1)} Z`;
  const yrs=[]; let ly=null;
  data.forEach((d,i)=>{const y=d.date.slice(0,4);if(y!==ly){yrs.push({y,i});ly=y;}});

  const sD=S.status==='live'?'lv':'st';
  const sT=S.status==='live'?'Live-Daten aktiv':'Historische Daten';

  const bs1=data.map((d,i)=>({...d,i})).filter(d=>tActive(d,TRANCHEN[0]));
  const bs2=data.map((d,i)=>({...d,i})).filter(d=>tActive(d,TRANCHEN[1]));
  const bs3=data.map((d,i)=>({...d,i})).filter(d=>tActive(d,TRANCHEN[2]));
  const hs=full.map((d,i)=>({...d,idx:i})).filter(d=>tActive(d,TRANCHEN[0])).map(d=>({...d,fw:fwdRet(full,d.idx)}));
  const valid=hs.filter(s=>s.fw!==null);
  const avg=valid.length?(valid.reduce((a,b)=>a+parseFloat(b.fw),0)/valid.length).toFixed(1):null;

  const tranchenHTML=TRANCHEN.map(t=>{
    const c1=cur.drawdown<t.spDD, c2=cur.vix>t.vixMin, c3=cur.fg<t.fgMax;
    const active=c1&&c2&&c3;
    return `<div class="tranche ${t.cls}${active?' active':''}">
      ${active?`<div class="now-badge">JETZT KAUFEN</div>`:''}
      <div class="t-badge">TRANCHE ${t.nr}</div>
      <div class="t-pct">${t.pct}%</div>
      <div class="t-desc">${t.desc}</div>
      <div class="t-conds">
        <div class="cond ${c1?'met':'unmet'}"><div class="cond-dot"></div>S&P 500 Drawdown ≥ ${Math.abs(t.spDD)}% — aktuell ${cur.drawdown.toFixed(1)}%</div>
        <div class="cond ${c2?'met':'unmet'}"><div class="cond-dot"></div>VIX > ${t.vixMin} — aktuell ${cur.vix.toFixed(1)}</div>
        <div class="cond ${c3?'met':'unmet'}"><div class="cond-dot"></div>Fear &amp; Greed < ${t.fgMax} — aktuell ${cur.fg}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML=`
    <div class="hl">Antizyklisches Investitions-System</div>
    <h1>3-Tranchen Einstiegsstrategie</h1>
    <p class="sub">Gestaffelt investieren bei Marktkorrekturen · Fear &amp; Greed · VIX · S&amp;P 500 Drawdown</p>
    <div class="ui"><div class="ud ${sD}"></div><div class="ut">${sT}${S.lastUp?' · Update: '+new Date(S.lastUp).toLocaleString('de-CH'):''}</div></div>

    <div class="tranchen">${tranchenHTML}</div>

    <div class="rechner">
      <div class="rechner-title">💰 Investitions-Rechner</div>
      <div class="rechner-row">
        <label>Verfügbares Kapital (CHF)</label>
        <input class="r-input" type="number" id="kap" value="${S.kapital}" min="1000" step="5000">
      </div>
      <div class="r-results">
        ${TRANCHEN.map(t=>`<div class="rr ${t.cls}">
          <div class="rr-label">Tranche ${t.nr} · ${t.pct}%</div>
          <div class="rr-val" id="rr${t.nr}">${chf(Math.round(S.kapital*t.pct/100))}</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="sr">
      ${[
        {l:'Fear & Greed',fmt:String(cur.fg),t:'< 25 / 10 / 5',m:cur.fg<25,c:'var(--amber)'},
        {l:'VIX',fmt:cur.vix.toFixed(2),t:'> 30',m:cur.vix>30,c:'var(--red)'},
        {l:'S&P 500 Drawdown',fmt:cur.drawdown.toFixed(2)+'%',t:'> 5% / 10% / 20%',m:cur.drawdown<-5,c:'var(--blue)'}
      ].map(c=>`<div class="sc ${c.m?'m':''}">
        <div class="lb">${c.l}</div>
        <div class="vl" style="color:${c.c}">${c.fmt}</div>
        <div class="th">Schwelle: ${c.t}</div>
        <div class="ck ${c.m?'y':'n'}">${c.m?'✓ Signal aktiv':'– Kein Signal'}</div>
      </div>`).join('')}
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">
      ${['3y','5y','10y','all'].map(t=>`<button class="btn${S.tr===t?' ac':''}" data-r="${t}">${t==='3y'?'3J':t==='5y'?'5J':t==='10y'?'10J':'Alle'}</button>`).join('')}
      <div style="margin-left:auto;font-size:11px;color:var(--green);font-weight:600">${bs1.length} Tranche-1-Signal${bs1.length!==1?'e':''} im Zeitraum</div>
    </div>

    <div class="cw"><svg id="ch" viewBox="0 0 ${W} ${HH}">
      ${[0,.25,.5,.75,1].map(f=>`<line x1="${pL}" x2="${W-pR}" y1="${(pT+f*pH).toFixed(1)}" y2="${(pT+f*pH).toFixed(1)}" stroke="rgba(148,163,184,.07)"/>`).join('')}
      ${bs3.map(s=>`<rect x="${(xS(s.i)-pW/data.length/2).toFixed(1)}" y="${pT}" width="${Math.max(pW/data.length,6).toFixed(1)}" height="${pH}" fill="var(--red)" opacity=".18" rx="2"/>`).join('')}
      ${bs2.filter(s=>!tActive(s,TRANCHEN[2])).map(s=>`<rect x="${(xS(s.i)-pW/data.length/2).toFixed(1)}" y="${pT}" width="${Math.max(pW/data.length,6).toFixed(1)}" height="${pH}" fill="var(--amber)" opacity=".13" rx="2"/>`).join('')}
      ${bs1.filter(s=>!tActive(s,TRANCHEN[1])).map(s=>`<rect x="${(xS(s.i)-pW/data.length/2).toFixed(1)}" y="${pT}" width="${Math.max(pW/data.length,6).toFixed(1)}" height="${pH}" fill="var(--green)" opacity=".10" rx="2"/>`).join('')}
      <path d="${spArea}" fill="rgba(148,163,184,.05)" stroke="none"/>
      <path d="${mkP(d=>ySP(d.sp))}" fill="none" stroke="rgba(148,163,184,.38)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <line x1="${pL}" x2="${W-pR}" y1="${yD(-5).toFixed(1)}" y2="${yD(-5).toFixed(1)}" stroke="var(--green)" stroke-dasharray="3,3" opacity=".5"/>
      <text x="${pL-3}" y="${(yD(-5)+3).toFixed(1)}" fill="var(--green)" font-size="8" text-anchor="end">−5%</text>
      <line x1="${pL}" x2="${W-pR}" y1="${yD(-10).toFixed(1)}" y2="${yD(-10).toFixed(1)}" stroke="var(--amber)" stroke-dasharray="3,3" opacity=".5"/>
      <text x="${pL-3}" y="${(yD(-10)+3).toFixed(1)}" fill="var(--amber)" font-size="8" text-anchor="end">−10%</text>
      <line x1="${pL}" x2="${W-pR}" y1="${yD(-20).toFixed(1)}" y2="${yD(-20).toFixed(1)}" stroke="var(--red)" stroke-dasharray="3,3" opacity=".5"/>
      <text x="${pL-3}" y="${(yD(-20)+3).toFixed(1)}" fill="var(--red)" font-size="8" text-anchor="end">−20%</text>
      <path d="${mkP(d=>yV(d.vix))}" fill="none" stroke="var(--red)" stroke-width="1.5" opacity=".65"/>
      <path d="${mkP(d=>yF(d.fg))}" fill="none" stroke="var(--amber)" stroke-width="1.5" opacity=".65"/>
      <path d="${mkP(d=>yD(d.drawdown))}" fill="none" stroke="var(--blue)" stroke-width="2.5" opacity=".9"/>
      ${bs1.map(s=>`<circle cx="${xS(s.i).toFixed(1)}" cy="${yD(s.drawdown).toFixed(1)}" r="${tActive(s,TRANCHEN[2])?7:tActive(s,TRANCHEN[1])?6:4}" fill="${tActive(s,TRANCHEN[2])?'var(--red)':tActive(s,TRANCHEN[1])?'var(--amber)':'var(--green)'}" stroke="#0a0e17" stroke-width="1.5"/>`).join('')}
      ${yrs.map(yl=>`<text x="${xS(yl.i).toFixed(1)}" y="${HH-pB+18}" text-anchor="middle" fill="var(--muted)" font-size="10">${yl.y}</text>`).join('')}
      ${[0,-5,-10,-15,-20].filter(v=>v>=mD-2).map(v=>`<text x="${W-pR+5}" y="${(yD(v)+3).toFixed(1)}" fill="rgba(96,165,250,.5)" font-size="8">${v}%</text>`).join('')}
      <g transform="translate(${pL+8},${pT+8})">
        <rect x="-4" y="-8" width="210" height="62" fill="rgba(10,14,23,.9)" rx="4"/>
        <circle cx="4" cy="0" r="4" fill="var(--blue)"/><text x="13" y="4" fill="var(--blue)" font-size="10">S&amp;P 500 Drawdown</text>
        <circle cx="4" cy="16" r="4" fill="var(--amber)"/><text x="13" y="20" fill="var(--amber)" font-size="10">Fear &amp; Greed Index</text>
        <circle cx="4" cy="32" r="4" fill="var(--red)"/><text x="13" y="36" fill="var(--red)" font-size="10">VIX</text>
        <line x1="0" x2="8" y1="48" y2="48" stroke="rgba(148,163,184,.45)" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="13" y="52" fill="rgba(148,163,184,.45)" font-size="10">S&amp;P 500 Kurs</text>
      </g>
    </svg></div>

    <div class="tb" id="tt"></div>

    <div class="sb">
      <div class="sh">
        <div class="st">Historische Kaufsignale (Tranche 1: DD ≥ 5% + VIX > 30 + F&amp;G < 25)</div>
        ${avg?`<div class="ab">Ø +${avg}% nach 12 Monaten</div>`:''}
      </div>
      ${hs.length===0
        ?'<div style="font-size:12px;color:var(--muted);padding:16px 0;text-align:center">Keine Signale im gewählten Zeitraum.</div>'
        :hs.map(s=>{
          const t2=tActive(s,TRANCHEN[1]),t3=tActive(s,TRANCHEN[2]);
          const tag=t3
            ?`<span style="background:rgba(239,68,68,.2);color:var(--red);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:6px">T1+T2+T3</span>`
            :t2
            ?`<span style="background:rgba(245,158,11,.2);color:var(--amber);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:6px">T1+T2</span>`
            :`<span style="background:rgba(34,197,94,.2);color:var(--green);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:6px">T1</span>`;
          return `<div class="sg">
            <div class="sd">${s.date}</div>
            <div class="si">F&amp;G: <b style="color:var(--amber)">${s.fg}</b> · VIX: <b style="color:var(--red)">${s.vix}</b> · DD: <b style="color:var(--blue)">${s.drawdown.toFixed(1)}%</b>${tag}</div>
            <div class="sret" style="color:${s.fw&&parseFloat(s.fw)>0?'var(--green)':s.fw?'var(--red)':'var(--muted)'}">${s.fw?(parseFloat(s.fw)>0?'+':'')+s.fw+'% (12M)':'offen'}</div>
          </div>`;
        }).join('')}
      <div class="hb">Monatliche Snapshots. Keine Anlageberatung.</div>
    </div>

    <div class="ft">Antizyklisches Investitions-System · Keine Anlageberatung · Live Daten · © how2invest.ch. Jegliche Weitergabe bedarf einer Genehmigung.</div>`;

  document.querySelectorAll('.btn[data-r]').forEach(b=>b.addEventListener('click',()=>{S.tr=b.dataset.r;render();}));
  document.getElementById('kap')?.addEventListener('input',e=>{
    S.kapital=parseInt(e.target.value)||100000;
    TRANCHEN.forEach(t=>{const el=document.getElementById('rr'+t.nr);if(el)el.textContent=chf(Math.round(S.kapital*t.pct/100));});
  });

  const ch=document.getElementById('ch'), tt=document.getElementById('tt');
  ch?.addEventListener('mousemove',e=>{
    const r=ch.getBoundingClientRect(), sx=((e.clientX-r.left)/r.width)*W;
    const idx=Math.round(((sx-pL)/pW)*(data.length-1));
    if(idx>=0&&idx<data.length){
      const d=data[idx];
      const t1=tActive(d,TRANCHEN[0]),t2=tActive(d,TRANCHEN[1]),t3=tActive(d,TRANCHEN[2]);
      const sig=t3?'🔴 T1+T2+T3':t2?'🟡 T1+T2':t1?'🟢 T1':'⚪ Abwarten';
      tt.className='tb a';
      tt.innerHTML=`
        <div><span class="tl">DATUM</span><div class="tv">${d.date}</div></div>
        <div><span class="tl">FEAR&GREED</span><div class="tv" style="color:var(--amber)">${d.fg}</div></div>
        <div><span class="tl">VIX</span><div class="tv" style="color:var(--red)">${d.vix.toFixed(1)}</div></div>
        <div><span class="tl">S&P 500</span><div class="tv">${d.sp.toLocaleString('de-CH')}</div></div>
        <div><span class="tl">DRAWDOWN</span><div class="tv" style="color:var(--blue)">${d.drawdown.toFixed(1)}%</div></div>
        <div><span class="tl">SIGNAL</span><div class="tv">${sig}</div></div>`;
    }
  });
  ch?.addEventListener('mouseleave',()=>{tt.className='tb';});
}

function doLogin() {
  if(document.getElementById('pw-input').value === 'richtiganlegen') {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

async function init() {
  S.data=buildData(null); S.status='stale'; render();
  try {
    const res=await fetch(WORKER+'/api/data');
    if(res.ok){
      const live=await res.json();
      S.data=buildData(live); S.status='live'; S.lastUp=live.fetchedAt; render();
    }
  } catch(e){}
  setInterval(async()=>{
    try{
      const res=await fetch(WORKER+'/api/data');
      if(res.ok){const live=await res.json();S.data=buildData(live);S.status='live';S.lastUp=live.fetchedAt;render();}
    }catch(e){}
  }, CACHE_MS);
}
// Start via Login
</script>
</body>
</html>
